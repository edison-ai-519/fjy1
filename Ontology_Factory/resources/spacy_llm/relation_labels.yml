version: "2026-04-24.relation.v1"
labels:
  - name: "controls"
    description: "主体对客体执行控制、调节、驱动、启停或开关动作。"
    allowed_aliases:
      - "control"
      - "regulated_by"
    examples:
      - "控制器 controls 水泵"
  - name: "monitors"
    description: "主体对客体执行监测、检测、采集或测量。"
    allowed_aliases:
      - "monitor"
      - "detects"
    examples:
      - "传感器 monitors 溶氧"
  - name: "reports_to"
    description: "主体将数据、事件或状态上传、上报、发送或同步给客体。"
    allowed_aliases:
      - "reports"
      - "sends_to"
    examples:
      - "ESP8266 reports_to OneNet"
  - name: "connected_to"
    description: "主体与客体建立连接、接入、联网、配网或物理/逻辑连通。"
    allowed_aliases:
      - "connects_to"
      - "linked_to"
    examples:
      - "ESP8266 connected_to OneNet"
  - name: "uses"
    description: "主体基于、采用、使用、依托客体。"
    allowed_aliases:
      - "use"
      - "based_on"
    examples:
      - "系统 uses ESP8266"
  - name: "co_occurs_with"
    description: "主体与客体在同一局部语义上下文中共同出现，但缺少更强的明确关系。"
    allowed_aliases:
      - "related_to"
      - "appears_with"
    examples:
      - "水温 co_occurs_with 光照"
