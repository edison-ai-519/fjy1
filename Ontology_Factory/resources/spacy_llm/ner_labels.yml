version: "2026-04-24.ner.v1"
labels:
  - name: "TERM"
    description: "业务概念、指标、领域术语或被讨论的对象名称。"
    allowed_aliases:
      - "术语"
      - "概念"
      - "指标"
    examples:
      - "溶氧"
      - "水温"
      - "光照"
      - "智能养鱼系统"
  - name: "TECH"
    description: "具体技术组件、硬件模块、平台、协议、软件框架或产品名。"
    allowed_aliases:
      - "技术"
      - "设备"
      - "平台"
    examples:
      - "ESP8266"
      - "OneNet"
      - "Arduino"
      - "FastAPI"
